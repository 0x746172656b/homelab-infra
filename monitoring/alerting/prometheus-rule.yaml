apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smartctl-disk-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: SMARTAlerts
      rules:
        - alert: DiskSmartStatusFailing
          expr: smartctl_device_smart_status == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "SMART health check failed on {{ $labels.synology_node }}"
            description: "Drive {{ $labels.device }} on {{ $labels.instance }} reports a failing SMART status. Device replacement recommended immediately."

        - alert: NVMeCriticalWarningTripped
          expr: smartctl_device_critical_warning > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "NVMe controller warning on {{ $labels.synology_node }}"
            description: "Device {{ $labels.device }} on {{ $labels.instance }} has flagged a critical hardware/controller warning (value: {{ $value }})."

        - alert: DiskAvailableSpareLow
          expr: smartctl_device_available_spare < 15
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Low available flash spare on {{ $labels.synology_node }}"
            description: "Drive {{ $labels.device }} remaining flash spare room has dropped to {{ $value }}%. The drive is approaching the end of its operational lifespan."

        - alert: DiskPercentageUsedHigh
          expr: smartctl_device_percentage_used > 85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High lifespan consumption on {{ $labels.synology_node }}"
            description: "Drive {{ $labels.device }} has consumed {{ $value }}% of its estimated life based on vendor write endurance ratings."

        - alert: DiskMediaErrorsAccumulating
          expr: increase(smartctl_device_media_errors[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Media errors detected on {{ $labels.synology_node }}"
            description: "Drive {{ $labels.device }} encountered {{ $value }} unrecovered data integrity errors (ECC/CRC) over the last 15 minutes. Indicates block corruption."

        - alert: DiskSmartctlCollectionFailing
          expr: smartctl_device_smartctl_exit_status > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Smartctl utility execution failure on {{ $labels.synology_node }}"
            description: "The exporter cannot successfully read SMART data for {{ $labels.device }} (Exit status code: {{ $value }}). The drive may be locked, missing, or dropping off the bus."

        - alert: DiskTemperatureHigh
          expr: smartctl_device_temperature{temperature_type="current"} > 65
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High disk temperature on {{ $labels.synology_node }}"
            description: "Drive {{ $labels.device }} is currently running at an elevated temperature of {{ $value }}°C."
