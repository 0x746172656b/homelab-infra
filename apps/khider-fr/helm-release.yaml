# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: khider-fr
  namespace: web
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    nameOverride: khider-fr-prod

    controllers:
      khider-fr:
        replicas: 2
        containers:
          main:
            image:
              repository: ghcr.io/0x746172656b/khider.fr
              tag: latest@sha256:a7980c196d9f24ae48529941f1686a8ee2505386e10baae173875a72ac6d3365
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
                  - SETUID
                  - SETGID
                  - NET_BIND_SERVICE
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi

    defaultPodOptions:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    service:
      main:
        controller: khider-fr
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: false
