apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-ingress-route
  namespace: media
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`jellyfin.local.khider.fr`)
      services:
        - name: jellyfin
          port: 8096
  tls:
    secretName: jellyfin-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jellyfin.local.khider.fr-cert
  namespace: media
spec:
  secretName: jellyfin-cert
  issuerRef:
    name: cloudflare-issuer
    kind: ClusterIssuer
  dnsNames:
    - jellyfin.local.khider.fr
