apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: velero
      version: 12.1.0
      sourceRef:
        kind: HelmRepository
        name: velero-repository
      interval: 5m
  releaseName: velero
  install:
    createNamespace: true
    remediation:
      retries: 3
