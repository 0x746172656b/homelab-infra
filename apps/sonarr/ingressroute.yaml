apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr-ingress-route
  namespace: media
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`sonarr.khider.fr`)
      services:
        - name: sonarr
          port: 8989
      middlewares:
        - name: sonarr-middleware
          namespace: media
  tls:
    secretName: sonarr-cert
