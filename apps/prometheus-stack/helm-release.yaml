apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: prometheus-stack
spec:
  releaseName: prometheus-stack
  targetNamespace: prometheus-stack
  install:
    createNamespace: true
  chart:
    spec:
      chart: prometheus-stack
      version: "v1.20.3"
      sourceRef:
        kind: HelmRepository
        name: prometheus-stack
        namespace: prometheus-stack
  interval: 1h0m0s
